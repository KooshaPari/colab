name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  ci-summary:
    name: ci-summary
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests]
    if: always()
    steps:
      - name: Assert required jobs succeeded
        env:
          TYPECHECK: ${{ needs.typecheck.result }}
          LINT: ${{ needs.lint.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
        run: |
          set -euo pipefail
          echo "typecheck=${TYPECHECK}"
          echo "lint=${LINT}"
          echo "unit-tests=${UNIT_TESTS}"

          test "${TYPECHECK}" = "success"
          test "${LINT}" = "success"
          test "${UNIT_TESTS}" = "success"
