<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>helios</title>
  <link rel="stylesheet" href="../ivde/xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .layout {
      display: grid;
      grid-template-columns: 240px 1fr 280px;
      grid-template-rows: 40px 1fr 28px;
      height: 100vh;
    }
    .topbar {
      grid-column: 1 / -1;
      background: #16213e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #2a2a4a;
      gap: 16px;
    }
    .topbar h1 { font-size: 14px; font-weight: 600; color: #7b8cde; }
    .topbar .status { font-size: 12px; color: #888; }
    .busy-indicator { color: #e8a838; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .left-rail {
      background: #1a1a2e;
      border-right: 1px solid #2a2a4a;
      padding: 12px;
      overflow-y: auto;
    }
    .center {
      background: #0f0f23;
      padding: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .right-rail {
      background: #1a1a2e;
      border-left: 1px solid #2a2a4a;
      padding: 12px;
      overflow-y: auto;
    }
    .statusbar {
      grid-column: 1 / -1;
      background: #16213e;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      color: #666;
      border-top: 1px solid #2a2a4a;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5a5a8a;
      margin-bottom: 8px;
    }
    .mt { margin-top: 16px; }
    .tab-list { list-style: none; }
    .tab-list li {
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .tab-list li:hover { background: #2a2a4a; }
    .tab-list li.active { background: #2a2a4a; color: #7b8cde; }
    .card {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 4px;
    }
    .card-label { font-size: 10px; color: #5a5a8a; }
    .card-value { font-size: 12px; word-break: break-all; }
    .btn {
      display: block;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 4px;
      background: #2a2a4a;
      color: #c0c0e0;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }
    .btn:hover:not(:disabled) { background: #3a3a5a; color: #fff; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .separator { height: 1px; background: #2a2a4a; margin: 8px 0; }
    .empty-state {
      color: #444;
      font-size: 14px;
      text-align: center;
    }
    .surface-ready {
      color: #5adb5a;
      font-size: 14px;
      text-align: center;
      padding: 24px;
      border: 1px dashed #3a5a3a;
      border-radius: 8px;
      background: #0f1a0f;
    }
    .event-log {
      max-height: 240px;
      overflow-y: auto;
    }
    .log-entry {
      display: flex;
      gap: 8px;
      font-size: 11px;
      padding: 2px 0;
      border-bottom: 1px solid #1a1a2e;
    }
    .log-entry.log-error .log-label { color: #e05555; }
    .log-ts { color: #555; min-width: 60px; }
    .log-label { color: #8a8abe; }
    .log-empty { font-size: 11px; color: #444; }
    .lane-table { display: flex; flex-direction: column; gap: 4px; }
    .lane-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 8px;
      font-size: 12px;
      padding: 6px 8px;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
    }
    .lane-id { color: #7b8cde; font-weight: 500; }
    .lane-transport { color: #888; }
    .lane-session { color: #6a9; }
    .lane-updated { color: #555; font-size: 10px; }
    .terminal-container {
      width: 100%;
      height: 100%;
      background: #0a0a1a;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      overflow: hidden;
    }
    .terminal-container .xterm { height: 100%; padding: 4px; }
    .terminal-container .xterm-viewport { overflow-y: auto !important; }
    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      background: #0a0a1a;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .chat-msg {
      display: flex;
      gap: 8px;
      font-size: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #1a1a2e;
    }
    .chat-user .chat-text { color: #7b8cde; }
    .chat-system .chat-text { color: #888; font-style: italic; }
    .chat-input-row {
      display: flex;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      padding: 8px 10px;
      background: #12122a;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .chat-input:focus { border-color: #7b8cde; }
    .chat-send-btn { width: auto !important; padding: 8px 16px !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.js"></script>
</body>
</html>
