<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helios Runtime</title>
    <link rel="stylesheet" href="../ivde/xterm.css" />
    <style>
      /* ── CSS Variables (Theme System) ── */
      :root {
        --color-bg-primary: #0f0f23;
        --color-bg-secondary: #1a1a2e;
        --color-bg-tertiary: #12122a;
        --color-bg-hover: #2a2a4a;
        --color-bg-active: #3a3a5a;
        --color-border: #2a2a4a;
        --color-text-primary: #e0e0e0;
        --color-text-secondary: #a0a0c0;
        --color-text-muted: #666;
        --color-accent: #7b8cde;
        --color-accent-alt: #b07acc;
        --color-success: #5adb5a;
        --color-warning: #e8a838;
        --color-error: #e05555;
        --color-info: #5ac8c8;
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing-md: 12px;
        --spacing-lg: 16px;
        --spacing-xl: 24px;
        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
        --transition-fast: 150ms ease-in-out;
        --transition-normal: 300ms ease-in-out;
        --font-mono: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", monospace;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      /* ── Base Styles ── */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        font-size: 13px;
        line-height: 1.5;
      }

      /* ── Layout Grid ── */
      .layout {
        display: grid;
        grid-template-columns: 260px 1fr 300px;
        grid-template-rows: 52px 1fr 32px;
        height: 100vh;
        gap: 0;
      }

      /* ── Top Bar (Header) ── */
      .topbar {
        grid-column: 1 / -1;
        background: var(--color-bg-secondary);
        border-bottom: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        padding: 0 var(--spacing-lg);
        gap: var(--spacing-lg);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .topbar h1 {
        font-size: 16px;
        font-weight: 700;
        color: var(--color-accent);
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
      }

      .topbar-icon {
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, var(--color-accent), var(--color-accent-alt));
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: bold;
        color: white;
      }

      .topbar-status {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        margin-left: auto;
        font-size: 12px;
      }

      .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: var(--spacing-xs);
      }

      .status-indicator.idle {
        background-color: var(--color-text-muted);
      }

      .status-indicator.active {
        background-color: var(--color-success);
        animation: pulse 2s infinite;
      }

      .status-indicator.error {
        background-color: var(--color-error);
        animation: pulse-fast 1s infinite;
      }

      .status-text {
        color: var(--color-text-secondary);
      }

      .busy-indicator {
        color: var(--color-warning);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: var(--spacing-xs);
        animation: pulse 1s infinite;
      }

      .busy-dot {
        width: 6px;
        height: 6px;
        background: currentColor;
        border-radius: 50%;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes pulse-fast {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Left Rail (Navigation & Controls) ── */
      .left-rail {
        background: var(--color-bg-secondary);
        border-right: 1px solid var(--color-border);
        padding: var(--spacing-lg);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .left-rail::-webkit-scrollbar {
        width: 6px;
      }

      .left-rail::-webkit-scrollbar-track {
        background: transparent;
      }

      .left-rail::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 3px;
      }

      .left-rail::-webkit-scrollbar-thumb:hover {
        background: var(--color-text-muted);
      }

      /* ── Center Content Area ── */
      .center {
        background: var(--color-bg-primary);
        padding: var(--spacing-lg);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--color-border);
      }

      /* ── Right Rail (Diagnostics & Metrics) ── */
      .right-rail {
        background: var(--color-bg-secondary);
        border-left: 1px solid var(--color-border);
        padding: var(--spacing-lg);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .right-rail::-webkit-scrollbar {
        width: 6px;
      }

      .right-rail::-webkit-scrollbar-track {
        background: transparent;
      }

      .right-rail::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 3px;
      }

      .right-rail::-webkit-scrollbar-thumb:hover {
        background: var(--color-text-muted);
      }

      /* ── Status Bar (Footer) ── */
      .statusbar {
        grid-column: 1 / -1;
        background: var(--color-bg-secondary);
        border-top: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        padding: 0 var(--spacing-lg);
        font-size: 11px;
        color: var(--color-text-muted);
        gap: var(--spacing-lg);
      }

      .statusbar-item {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
      }

      .statusbar-icon {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--color-accent);
      }

      /* ── Section Titles ── */
      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--color-accent);
        margin-bottom: var(--spacing-md);
        font-weight: 600;
        padding-bottom: var(--spacing-sm);
        border-bottom: 1px solid var(--color-border);
      }

      .mt {
        margin-top: var(--spacing-lg);
      }

      /* ── Segmented Tab Controls ── */
      .tab-group {
        display: flex;
        gap: var(--spacing-xs);
        background: var(--color-bg-tertiary);
        padding: var(--spacing-xs);
        border-radius: var(--radius-md);
        border: 1px solid var(--color-border);
        margin-bottom: var(--spacing-lg);
      }

      .tab-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: var(--spacing-xs);
      }

      .tab-list li {
        padding: 8px var(--spacing-md);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 12px;
        transition: all var(--transition-fast);
        background: transparent;
        color: var(--color-text-secondary);
        border: 1px solid transparent;
      }

      .tab-list li:hover {
        background: var(--color-bg-hover);
        color: var(--color-text-primary);
      }

      .tab-list li.active {
        background: var(--color-accent);
        color: white;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(123, 140, 222, 0.3);
      }

      /* ── Cards ── */
      .card {
        background: var(--color-bg-tertiary);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--spacing-md);
        margin-bottom: var(--spacing-sm);
        transition: all var(--transition-fast);
      }

      .card:hover {
        border-color: var(--color-accent);
        background: rgba(123, 140, 222, 0.05);
      }

      .card-label {
        font-size: 10px;
        color: var(--color-accent);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: var(--spacing-xs);
        font-weight: 600;
      }

      .card-value {
        font-size: 12px;
        word-break: break-all;
        font-family: var(--font-mono);
        color: var(--color-text-primary);
      }

      .card-value.status-ok {
        color: var(--color-success);
      }

      .card-value.status-error {
        color: var(--color-error);
      }

      /* ── Buttons ── */
      .btn {
        display: block;
        width: 100%;
        padding: 8px var(--spacing-md);
        margin-bottom: var(--spacing-xs);
        background: var(--color-bg-tertiary);
        color: var(--color-text-primary);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        text-align: center;
        font-family: inherit;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }

      .btn:hover:not(:disabled) {
        background: var(--color-bg-hover);
        color: var(--color-text-primary);
        border-color: var(--color-accent);
        transform: translateY(-1px);
      }

      .btn:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn.primary {
        background: var(--color-accent);
        color: white;
        border-color: var(--color-accent);
        font-weight: 600;
      }

      .btn.primary:hover:not(:disabled) {
        background: lighten(var(--color-accent), 10%);
        box-shadow: 0 4px 12px rgba(123, 140, 222, 0.4);
      }

      .btn.secondary {
        background: transparent;
        border-color: var(--color-border);
      }

      .btn.danger {
        color: var(--color-error);
        border-color: var(--color-error);
      }

      .btn.danger:hover:not(:disabled) {
        background: rgba(224, 85, 85, 0.1);
        border-color: var(--color-error);
      }

      /* ── Separator ── */
      .separator {
        height: 1px;
        background: var(--color-border);
        margin: var(--spacing-md) 0;
      }

      /* ── Empty State & Onboarding ── */
      .empty-state {
        color: var(--color-text-muted);
        font-size: 13px;
        text-align: center;
        padding: var(--spacing-lg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: var(--spacing-lg);
      }

      .empty-icon {
        font-size: 32px;
        opacity: 0.5;
        margin-bottom: var(--spacing-md);
      }

      .onboarding-panel {
        background: var(--color-bg-tertiary);
        border: 2px solid var(--color-accent);
        border-radius: var(--radius-lg);
        padding: var(--spacing-xl);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: var(--spacing-lg);
      }

      .onboarding-icon {
        font-size: 48px;
        opacity: 0.8;
        margin-bottom: var(--spacing-md);
      }

      .onboarding-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--color-accent);
        margin-bottom: var(--spacing-sm);
      }

      .onboarding-desc {
        color: var(--color-text-secondary);
        font-size: 13px;
        line-height: 1.6;
        max-width: 320px;
        margin-bottom: var(--spacing-lg);
      }

      .onboarding-btn {
        width: auto;
        padding: 10px 24px;
        font-weight: 600;
      }

      /* ── Surface Ready State ── */
      .surface-ready {
        color: var(--color-success);
        font-size: 14px;
        text-align: center;
        padding: var(--spacing-xl);
        border: 1px solid var(--color-success);
        border-radius: var(--radius-lg);
        background: rgba(90, 219, 90, 0.05);
        margin-bottom: var(--spacing-lg);
      }

      /* ── Terminal Container ── */
      .terminal-container {
        width: 100%;
        height: 100%;
        background: #0a0a1a;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      .terminal-container .xterm {
        height: 100%;
        padding: var(--spacing-sm);
        flex: 1;
      }

      .terminal-container .xterm-viewport {
        overflow-y: auto !important;
      }

      .terminal-header {
        background: var(--color-bg-tertiary);
        border-bottom: 1px solid var(--color-border);
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: 11px;
        color: var(--color-text-secondary);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* ── Chat Interface ── */
      .chat-container {
        display: flex;
        flex-direction: column;
        height: 100%;
        gap: var(--spacing-md);
      }

      .chat-log {
        flex: 1;
        overflow-y: auto;
        padding: var(--spacing-md);
        background: var(--color-bg-tertiary);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
      }

      .chat-log::-webkit-scrollbar {
        width: 6px;
      }

      .chat-log::-webkit-scrollbar-track {
        background: transparent;
      }

      .chat-log::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 3px;
      }

      .chat-msg {
        display: flex;
        gap: var(--spacing-md);
        font-size: 12px;
        padding: var(--spacing-sm);
        border-radius: var(--radius-md);
        align-items: flex-start;
      }

      .chat-msg.chat-user {
        background: rgba(123, 140, 222, 0.1);
        border-left: 2px solid var(--color-accent);
      }

      .chat-msg.chat-user .chat-text {
        color: var(--color-accent);
      }

      .chat-msg.chat-system {
        background: rgba(224, 85, 85, 0.05);
        border-left: 2px solid var(--color-error);
      }

      .chat-msg.chat-system .chat-text {
        color: var(--color-error);
        font-style: italic;
      }

      .chat-ts {
        font-size: 10px;
        color: var(--color-text-muted);
        min-width: 50px;
        flex-shrink: 0;
      }

      .chat-text {
        flex: 1;
        word-break: break-word;
      }

      .chat-input-row {
        display: flex;
        gap: var(--spacing-sm);
      }

      .chat-input {
        flex: 1;
        padding: var(--spacing-sm) var(--spacing-md);
        background: var(--color-bg-tertiary);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        font-size: 12px;
        outline: none;
        transition: all var(--transition-fast);
      }

      .chat-input:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 2px rgba(123, 140, 222, 0.2);
        background: var(--color-bg-tertiary);
      }

      .chat-send-btn {
        width: auto !important;
        padding: var(--spacing-sm) var(--spacing-lg) !important;
        margin-bottom: 0 !important;
      }

      /* ── Event Log ── */
      .event-log {
        max-height: 280px;
        overflow-y: auto;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        background: var(--color-bg-tertiary);
        padding: var(--spacing-sm);
      }

      .event-log::-webkit-scrollbar {
        width: 4px;
      }

      .event-log::-webkit-scrollbar-track {
        background: transparent;
      }

      .event-log::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 2px;
      }

      .log-entry {
        display: flex;
        gap: var(--spacing-sm);
        font-size: 11px;
        padding: var(--spacing-xs) var(--spacing-sm);
        border-bottom: 1px solid var(--color-border);
        align-items: center;
      }

      .log-entry:last-child {
        border-bottom: none;
      }

      .log-entry.log-error {
        background: rgba(224, 85, 85, 0.05);
      }

      .log-entry.log-error .log-icon {
        color: var(--color-error);
      }

      .log-entry.log-ok .log-icon {
        color: var(--color-success);
      }

      .log-icon {
        font-size: 10px;
        min-width: 10px;
        width: 10px;
      }

      .log-ts {
        color: var(--color-text-muted);
        min-width: 55px;
        flex-shrink: 0;
        font-family: var(--font-mono);
      }

      .log-label {
        color: var(--color-text-secondary);
        flex: 1;
      }

      .log-empty {
        font-size: 11px;
        color: var(--color-text-muted);
        padding: var(--spacing-md);
        text-align: center;
      }

      /* ── Lane Table & Metrics ── */
      .lane-table {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        overflow: hidden;
      }

      .lane-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr auto;
        gap: var(--spacing-md);
        font-size: 12px;
        padding: var(--spacing-md);
        background: var(--color-bg-tertiary);
        border-bottom: 1px solid var(--color-border);
        align-items: center;
        transition: all var(--transition-fast);
      }

      .lane-row:last-child {
        border-bottom: none;
      }

      .lane-row:hover {
        background: var(--color-bg-hover);
      }

      .lane-status {
        display: flex;
        align-items: center;
        gap: var(--spacing-xs);
        font-weight: 500;
      }

      .lane-status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }

      .lane-status-dot.active {
        background: var(--color-success);
      }

      .lane-status-dot.idle {
        background: var(--color-text-muted);
      }

      .lane-status-dot.error {
        background: var(--color-error);
      }

      .lane-id {
        color: var(--color-accent);
        font-weight: 600;
        font-family: var(--font-mono);
      }

      .lane-transport {
        color: var(--color-text-secondary);
        font-size: 11px;
      }

      .lane-session {
        color: var(--color-info);
        font-family: var(--font-mono);
        font-size: 11px;
      }

      .lane-updated {
        color: var(--color-text-muted);
        font-size: 10px;
        font-family: var(--font-mono);
      }

      /* ── Metrics Dashboard ── */
      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: var(--spacing-md);
        margin-top: var(--spacing-md);
      }

      .metric-card {
        background: var(--color-bg-tertiary);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--spacing-md);
        transition: all var(--transition-fast);
      }

      .metric-card:hover {
        border-color: var(--color-accent);
        background: rgba(123, 140, 222, 0.05);
      }

      .metric-name {
        font-size: 11px;
        color: var(--color-accent);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
        margin-bottom: var(--spacing-sm);
      }

      .metric-value {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-accent);
        font-family: var(--font-mono);
        margin-bottom: var(--spacing-sm);
      }

      .metric-stats {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-xs);
        font-size: 10px;
      }

      .metric-stat {
        display: flex;
        justify-content: space-between;
        color: var(--color-text-secondary);
      }

      .metric-stat-value {
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        font-weight: 500;
      }

      /* ── Toast Notifications ── */
      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--spacing-md) var(--spacing-lg);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        font-size: 12px;
        animation: slideUp var(--transition-normal);
        z-index: 1000;
        max-width: 400px;
      }

      .toast.success {
        border-color: var(--color-success);
        background: rgba(90, 219, 90, 0.1);
      }

      .toast.success .toast-icon {
        color: var(--color-success);
      }

      .toast.error {
        border-color: var(--color-error);
        background: rgba(224, 85, 85, 0.1);
      }

      .toast.error .toast-icon {
        color: var(--color-error);
      }

      .toast.warning {
        border-color: var(--color-warning);
        background: rgba(232, 168, 56, 0.1);
      }

      .toast.warning .toast-icon {
        color: var(--color-warning);
      }

      .toast-icon {
        font-size: 14px;
        flex-shrink: 0;
      }

      .toast-message {
        flex: 1;
        color: var(--color-text-primary);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      /* ── Loading Spinner ── */
      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid var(--color-border);
        border-top-color: var(--color-accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      .spinner-sm {
        width: 10px;
        height: 10px;
        border-width: 1.5px;
      }

      /* ── Focus States ── */
      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 2px;
      }

      /* ── Modal / Confirmation Dialog ── */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn var(--transition-fast);
      }

      .modal {
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--spacing-xl);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        max-width: 400px;
        animation: slideIn var(--transition-normal);
      }

      .modal-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: var(--spacing-lg);
      }

      .modal-message {
        font-size: 13px;
        color: var(--color-text-secondary);
        margin-bottom: var(--spacing-xl);
        line-height: 1.6;
      }

      .modal-actions {
        display: flex;
        gap: var(--spacing-md);
        justify-content: flex-end;
      }

      .modal-actions .btn {
        width: auto;
        margin-bottom: 0;
        padding: 8px var(--spacing-lg);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
